version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    versioning-strategy: "increase"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "05:00"
      timezone: "Asia/Kolkata"
    commit-message:
      prefix: "build(deps)"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "05:00"
      timezone: "Asia/Kolkata"
    commit-message:
      prefix: "build(actions)"
    open-pull-requests-limit: 5
    labels:
      - "ci/cd"
      - "dependencies"
